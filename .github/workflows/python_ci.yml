name: Practice github action
on: [push]
jobs:
  test-program:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: git clone https://github.com/Amir-dev0/gha-lab-1.git

      - name: Installing requirements
        run: pip install -r requirements.txt
        working-directory: gha-lab-1

      - name: Testing  
        run: pytest test_program.py
        working-directory: gha-lab-1